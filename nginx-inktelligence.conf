# nginx config for inktelligence.online → FastAPI app on port 8889
# Deploy: sudo cp nginx-inktelligence.conf /etc/nginx/sites-available/inktelligence.online
#         sudo ln -sf /etc/nginx/sites-available/inktelligence.online /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name inktelligence.online www.inktelligence.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name inktelligence.online www.inktelligence.online;

    # SSL — replace with your cert paths (e.g. Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/inktelligence.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktelligence.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WebSocket paths — MUST come before the catch-all location /
    # Without proxy_http_version 1.1 + Upgrade/Connection headers,
    # nginx drops the Upgrade header and the handshake returns 404/400.
    location /ws/ {
        proxy_pass         http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # All other requests
    location / {
        proxy_pass         http://127.0.0.1:8889;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
