# nginx config for inktelligence.online + intelwebsecurity.com → FastAPI app on port 8889
#
# Deploy:
#   sudo cp nginx-inktelligence.conf /etc/nginx/sites-available/cfai
#   sudo ln -sf /etc/nginx/sites-available/cfai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (run once per domain):
#   sudo certbot certonly --nginx -d inktelligence.online -d www.inktelligence.online
#   sudo certbot certonly --nginx -d intelwebsecurity.com -d www.intelwebsecurity.com

# ── Redirect HTTP → HTTPS for both domains ────────────────────────────────────
server {
    listen 80;
    server_name inktelligence.online www.inktelligence.online
                intelwebsecurity.com www.intelwebsecurity.com;
    return 301 https://$host$request_uri;
}

# ── inktelligence.online ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inktelligence.online www.inktelligence.online;

    ssl_certificate     /etc/letsencrypt/live/inktelligence.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktelligence.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /ws/ {
        proxy_pass         http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://127.0.0.1:8889;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── intelwebsecurity.com ──────────────────────────────────────────────────────
