<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intel Web Security — Sign In</title>
  <link rel="icon" href="/static/Intel.jpeg" type="image/jpeg">
  <link rel="shortcut icon" href="/static/Intel.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/static/Intel.jpeg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
    }
    .card {
      background: #1b1d27;
      border: 1px solid #2a2d3a;
      border-radius: 14px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }
    .logo-text { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .logo-sub  { font-size: 10px; color: #6b7280; letter-spacing: .5px; text-transform: uppercase; margin-top: 1px; }
    h1 { font-size: 21px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; letter-spacing: .3px; }
    input[type=text], input[type=password], input[type=email] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e5e7eb;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #2563eb; }
    .alert {
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 12px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .alert-error   { background: rgba(168,0,0,.12); border: 1px solid rgba(168,0,0,.3); color: #fca5a5; }
    .alert-success { background: rgba(16,124,16,.12); border: 1px solid rgba(16,124,16,.3); color: #86efac; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      margin-top: 4px;
    }
    .btn:hover { background: #1d4ed8; }
    .footer { margin-top: 22px; text-align: center; font-size: 12px; color: #6b7280; }
    .footer a { color: #60a5fa; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .divider { height: 1px; background: #2a2d3a; margin: 22px 0; }
    .resend-wrap { margin-top: 14px; text-align: center; }
    .resend-toggle { background: none; border: none; color: #60a5fa; font-size: 12px; cursor: pointer; font-family: inherit; }
    .resend-toggle:hover { text-decoration: underline; }
    .resend-form { display: none; margin-top: 12px; }
    .resend-form input { margin-bottom: 8px; }
    .resend-form button {
      width: 100%; padding: 8px; background: #1e293b; color: #93c5fd;
      border: 1px solid #2a2d3a; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .resend-form button:hover { background: #1e3a5f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/Intel.jpeg" alt="Intel Web Security" style="width:36px;height:36px;border-radius:9px;object-fit:cover;flex-shrink:0;">
      <div>
        <div class="logo-text">Intel Web Security</div>
        <div class="logo-sub">Security Intelligence</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Use your username or Gmail address to sign in.</p>

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">
      {{ error }}
      {% if signup_hint %}
      <div style="margin-top:10px;">
        Don't have an account?
        <a href="/signup" style="color:#93c5fd;font-weight:600;text-decoration:underline;">Create one with your Gmail &rarr;</a>
      </div>
      {% endif %}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">USERNAME OR EMAIL</label>
        <input type="text" id="username" name="username" placeholder="username or you@gmail.com"
               autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>

    <div class="resend-wrap">
      <button class="resend-toggle" onclick="toggleResend()">Didn't receive verification email?</button>
      <div class="resend-form" id="resend-form">
        <form method="POST" action="/resend-verification">
          <input type="email" name="email" placeholder="your@gmail.com" required>
          <button type="submit">Resend verification email</button>
        </form>
      </div>
    </div>

    <div class="divider"></div>
    <div class="footer">
      Don't have an account? <a href="/signup">Create one</a>
    </div>
  </div>

  <script>
    function toggleResend() {
      var f = document.getElementById('resend-form');
      f.style.display = f.style.display === 'none' || !f.style.display ? 'block' : 'none';
    }
  </script>
</body>
</html>
